services:
  - type: web
    name: gestionrh
    env: python
    buildCommand: pip install -r requirements.txt && mkdir -p staticfiles && python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear && python manage.py create_superuser
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestionrh-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: gestionrh.onrender.com
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        value: admin123456
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@gestionrh.onrender.com

databases:
  - name: gestionrh-db
    databaseName: gestionrh
    user: gestionrh
