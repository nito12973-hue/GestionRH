services:
  - type: web
    name: gestionrh
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestionrh-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: gestionrh.onrender.com

databases:
  - name: gestionrh-db
    databaseName: gestionrh
    user: gestionrh
